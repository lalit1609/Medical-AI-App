<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAI // Intelligence</title>
    <!-- BROWSER TAB CONFIGURATION -->
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for uploads -->
        <aside class="sidebar">
            <!-- SIDEBAR BRANDING CONFIGURATION -->
            <div class="brand">
                <img src="logo-web.png" alt="MedAI Logo" class="brand-logo">
                <span>MedAI</span>
            </div>
            
            <div class="upload-box">
                <label for="report-upload" class="custom-file-upload">
                    <span>＋ Drop Report here</span>
                    <p>PDF, PNG, or JPG</p>
                </label>
                <input type="file" id="report-upload" accept="application/pdf, image/*" />
                <div id="file-name" class="file-name">No file selected</div>
            </div>
            
            <div id="loading" class="loading-container hidden">
                <div class="spinner"></div>
                <p id="loading-text">Parsing data...</p>
            </div>
        </aside>

        <!-- Main Dashboard Workspace -->
        <main class="main-content">
            <!-- Structured Engine Results Layout -->
            <section id="results" class="results-grid hidden">
                <div class="card full-width">
                    <h3>Clinical Analysis Summary</h3>
                    <p id="summary-text" class="summary-p">Metrics loaded.</p>
                </div>
                <div class="card">
                    <h3>Flagged Biomarkers & Ranges</h3>
                    <ul id="values-list" class="data-list"></ul>
                </div>
                <div class="card">
                    <h3>Simplified Glossary</h3>
                    <ul id="terms-list" class="data-list"></ul>
                </div>
                <div class="card full-width">
                    <h3>Recommended Doctor Discussion Points</h3>
                    <ul id="questions-list" class="data-list"></ul>
                </div>
            </section>

            <!-- ChatGPT style Chat interface -->
            <section class="chat-section">
                <div id="chat-history" class="chat-history">
                    <div class="chat-message ai-message">
                        Hello. Upload a lab report or ask me any general medical question to begin.
                    </div>
                </div>
                <div class="chat-input-container">
                    <input type="text" id="chat-input" placeholder="Ask about terms, ranges, or medication classes..." autocomplete="off">
                    <button id="send-chat-btn">Send</button>
                </div>
            </section>
        </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
